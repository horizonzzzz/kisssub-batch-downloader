name: Release Extension

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate tag matches package.json version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          expected="${TAG_NAME#v}"
          actual="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")"

          if [ "$actual" != "$expected" ]; then
            echo "::error::Tag version $expected does not match package.json version $actual"
            exit 1
          fi

      - name: Build extension
        run: pnpm build

      - name: Validate built manifest version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          expected="${TAG_NAME#v}"
          actual="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('build/chrome-mv3-prod/manifest.json', 'utf8')).version)")"

          if [ "$actual" != "$expected" ]; then
            echo "::error::Built manifest version $actual does not match tag version $expected"
            exit 1
          fi

      - name: Package extension
        run: pnpm package

      - name: Locate packaged archive
        id: packaged_archive
        run: |
          mapfile -t archives < <(find build -type f -name '*.zip' | sort)

          if [ "${#archives[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one packaged archive, found ${#archives[@]}"
            printf '%s\n' "${archives[@]}"
            exit 1
          fi

          echo "path=${archives[0]}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          ASSET_PATH: ${{ steps.packaged_archive.outputs.path }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ASSET_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$ASSET_PATH" \
              --title "$TAG_NAME" \
              --generate-notes
          fi
